name: 'CodeQL'

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  check-changes:
    name: Check Changed Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List changed files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"

            if git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              git diff --name-only "${BEFORE_SHA}" "${AFTER_SHA}"
            else
              echo "Previous commit ${BEFORE_SHA} is not available locally (e.g., force-push/history rewrite)."
              echo "Falling back to listing files from the current commit."
              git diff-tree --no-commit-id --name-only -r "${AFTER_SHA}"
            fi
          else
            echo "Initial push detected; listing files from the current commit."
            git diff-tree --no-commit-id --name-only -r "${{ github.sha }}"
          fi

  analyze:
    name: Analyze
    needs: check-changes
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

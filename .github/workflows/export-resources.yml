name: Export Database to resources.md

on:
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      message:
        description: 'Commit message'
        required: false
        default: 'chore: update resources.md from database'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMMIT_MESSAGE: 'chore: update resources.md from database'
  # Must be a PAT/GitHub App token so pull_request/push workflows trigger for auto-update commits.
  WORKFLOW_GIT_TOKEN: ${{ secrets.AUTO_UPDATE_GITHUB_TOKEN }}

jobs:
  export:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate automation token
        run: |
          if [ -z "${{ env.WORKFLOW_GIT_TOKEN }}" ]; then
            echo "AUTO_UPDATE_GITHUB_TOKEN is required.
            Using GITHUB_TOKEN suppresses downstream CodeQL pull_request/push workflows for bot-created commits and PRs."
                    exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Need write access for committing
          token: ${{ env.WORKFLOW_GIT_TOKEN }}
          # Fetch all history for proper diff detection
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Export database to resources.md
        run: npx tsx scripts/export-to-md.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --exit-code --quiet resources.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in resources.md"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in resources.md"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ env.WORKFLOW_GIT_TOKEN }}
          commit-message: ${{ env.COMMIT_MESSAGE }}
          title: 'chore: update resources.md from database'
          body: |
            This PR was automatically generated by the export workflow.

            ## Changes
            - Updated `resources.md` with latest data from the database

            ## Review Checklist
            - [ ] Verify the changes look correct
            - [ ] Merge to update the main resources.md file
          branch: auto-update/resources-md
          base: main
          delete-branch: true
